<!DOCTYPE html>
<html lang="ja">
<head>
  <title>受講生一覧</title>
</head>
<body>
<h1>受講生一覧</h1>
<table>
  <tr>
    <th>ID</th>
    <th>名前</th>
    <th>かな名</th>
    <th>ニックネーム</th>
    <th>メールアドレス</th>
    <th>地域</th>
    <th>年齢</th>
    <th>性別</th>
    <th>備考</th>
  </tr>
  <tr data-th-each="studentDetail : ${studentList}">
    <td data-th-text="${studentDetail.student.id}">1</td>
    <td data-th-text="${studentDetail.student.name}">山田太郎</td>
    <td data-th-text="${studentDetail.student.furigana}">ヤマダタロウ</td>
    <td data-th-text="${studentDetail.student.nickname}">タロー</td>
    <td data-th-text="${studentDetail.student.email}">taro@example.com</td>
    <td data-th-text="${studentDetail.student.address}">東京</td>
    <td data-th-text="${studentDetail.student.age}">20</td>
    <td data-th-text="${studentDetail.student.gender}">男性</td>
    <td data-th-text="${studentDetail.student.remark}">特になし</td>
  </tr>
</table>
</body>
</html>
